<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wang Sen</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #07080d;
            --text: #f5f7fb;
            --muted: #8f98aa;
            --line: rgba(255, 255, 255, 0.12);
            --green: #62ff9b;
            --blue: #48b8ff;
            --red: #ff416c;
            --card: rgba(255, 255, 255, 0.07);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: var(--bg);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -25%;
            z-index: -2;
            background:
                conic-gradient(from 120deg at 48% 50%, #07080d, #102a33, #251426, #071826, #07080d);
            animation: spin 18s linear infinite;
            filter: blur(30px);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                radial-gradient(circle at 50% 24%, transparent 0 22%, rgba(7, 8, 13, 0.82) 56%, #07080d 100%);
            background-size: 42px 42px, 42px 42px, auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .shell {
            width: min(1120px, calc(100% - 32px));
            min-height: 100vh;
            margin: 0 auto;
            padding: 26px 0;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        header,
        footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            color: var(--muted);
            font-size: 14px;
        }

        .logo {
            display: inline-grid;
            width: 42px;
            height: 42px;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-weight: 900;
        }

        .links {
            display: flex;
            gap: 10px;
        }

        .links a,
        .cta {
            min-height: 42px;
            padding: 0 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.055);
            font-weight: 800;
            transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
        }

        .links a:hover,
        .cta:hover {
            transform: translateY(-2px);
            border-color: rgba(98, 255, 155, 0.58);
            background: rgba(98, 255, 155, 0.1);
        }

        main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            align-items: center;
            gap: 38px;
            padding: 54px 0 44px;
        }

        .hero {
            max-width: 760px;
        }

        .kicker {
            margin: 0 0 14px;
            color: var(--green);
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(62px, 12vw, 158px);
            line-height: 0.82;
            letter-spacing: 0;
        }

        .name {
            display: block;
            color: transparent;
            background: linear-gradient(110deg, #ffffff 0%, var(--blue) 38%, var(--green) 72%, #ffffff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 42px rgba(72, 184, 255, 0.18);
        }

        .subtitle {
            max-width: 540px;
            margin: 24px 0 0;
            color: #d7dde8;
            font-size: clamp(18px, 2vw, 24px);
            line-height: 1.55;
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 30px;
        }

        .cta.primary {
            border-color: transparent;
            background: var(--text);
            color: #07080d;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--card);
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.38);
            backdrop-filter: blur(18px);
            overflow: hidden;
        }

        .avatar {
            min-height: 290px;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 50% 38%, rgba(98, 255, 155, 0.24), transparent 30%),
                linear-gradient(145deg, rgba(72, 184, 255, 0.18), rgba(255, 65, 108, 0.13));
        }

        .avatar span {
            width: 154px;
            height: 154px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            background: rgba(7, 8, 13, 0.62);
            font-size: 54px;
            font-weight: 950;
            box-shadow: inset 0 0 34px rgba(255, 255, 255, 0.08), 0 0 60px rgba(72, 184, 255, 0.28);
        }

        .meta {
            padding: 20px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            padding: 12px 0;
            border-top: 1px solid var(--line);
            color: var(--muted);
        }

        .meta-row:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .meta-row strong {
            color: var(--text);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 28px;
        }

        .tag {
            padding: 9px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.055);
            color: #e7ecf6;
            font-size: 13px;
            font-weight: 900;
        }

        .strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 32px;
        }

        .tile {
            min-height: 118px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.055);
        }

        .tile b {
            display: block;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .tile span {
            color: var(--muted);
            line-height: 1.6;
        }

        footer {
            padding-top: 22px;
            border-top: 1px solid var(--line);
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                padding-top: 42px;
            }

            .panel {
                max-width: 520px;
            }

            .strip {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .shell {
                width: min(100% - 22px, 1120px);
                padding-top: 16px;
            }

            header,
            footer {
                align-items: flex-start;
                flex-direction: column;
            }

            .links {
                width: 100%;
                flex-wrap: wrap;
            }

            .links a,
            .cta {
                flex: 1 1 auto;
            }

            h1 {
                font-size: clamp(58px, 23vw, 92px);
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <a class="logo" href="#">WS</a>
            <nav class="links" aria-label="links">
                <a href="https://github.com/wswsddd" target="_blank" rel="noreferrer">GitHub</a>
                <a href="#work">Work</a>
            </nav>
        </header>

        <main>
            <section class="hero" aria-label="intro">
                <p class="kicker">github.io / personal page</p>
                <h1><span>Wang</span><span class="name">Sen</span></h1>
                <p class="subtitle">Code. Games. Shipping small things that work.</p>

                <div class="action-row">
                    <a class="cta primary" href="https://github.com/wswsddd" target="_blank" rel="noreferrer">Open GitHub</a>
                    <a class="cta" href="#work">View Work</a>
                </div>

                <div class="tags" aria-label="tags">
                    <span class="tag">Web</span>
                    <span class="tag">Tools</span>
                    <span class="tag">LOL</span>
                    <span class="tag">DOTA</span>
                    <span class="tag">CSGO</span>
                    <span class="tag">PUBG</span>
                    <span class="tag">WOW</span>
                </div>

                <div class="strip" id="work">
                    <div class="tile">
                        <b>01</b>
                        <span>Portfolio</span>
                    </div>
                    <div class="tile">
                        <b>02</b>
                        <span>Game notes</span>
                    </div>
                    <div class="tile">
                        <b>03</b>
                        <span>Open source</span>
                    </div>
                </div>
            </section>

            <aside class="panel" aria-label="profile card">
                <div class="avatar"><span>WS</span></div>
                <div class="meta">
                    <div class="meta-row"><span>Name</span><strong>Wang Sen</strong></div>
                    <div class="meta-row"><span>GitHub</span><strong>@wswsddd</strong></div>
                    <div class="meta-row"><span>Status</span><strong>Online</strong></div>
                </div>
            </aside>
        </main>

        <footer>
            <span>Wang Sen</span>
            <span>Built for GitHub Pages</span>
        </footer>
    </div>
</body>
</html>
